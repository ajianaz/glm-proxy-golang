services:
  glm-proxy:
    build: .
    container_name: glm-proxy-go
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - ZAI_API_KEY=${ZAI_API_KEY}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-glm-4.7}
      - DATA_FILE=/app/data/apikeys.json
    volumes:
      - ./data:/app/data:rw
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "/server", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Uncomment for Traefik:
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.glm-proxy.rule=Host(`glm.example.com`)"
    #   - "traefik.http.routers.glm-proxy.tls=true"
    #   - "traefik.http.routers.glm-proxy.tls.certresolver=letsencrypt"
    #   - "traefik.http.services.glm-proxy.loadbalancer.server.port=3000"
